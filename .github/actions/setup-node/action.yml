name: Setup Node
description: Install Node.js and npm dependencies.

inputs:
  node-version:
    description: Node.js version used by CI.
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install npm dependencies
      shell: bash
      run: npm ci

    - name: Show Node versions
      shell: bash
      run: |
        node --version
        npm --version
